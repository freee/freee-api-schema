      summary: 納品更新
      description: |-
        <h2 id="">概要</h2>
        <p>指定されたIDの納品を更新します。
        納品の基本情報、請求・入金情報などを部分的に更新できます。
        送信したフィールドのみが更新され、送信しなかったフィールドは変更されません。
        </p>
        <h2 id="_2">定義</h2>
        <h3>更新可能項目</h3>
        <ul>
        <li>
        <p>branch_no : 枝番</p>
        </li>
        <li>
        <p>internal_subject : 納品タイトル</p>
        </li>
        <li>
        <p>delivery_date : 納品日</p>
