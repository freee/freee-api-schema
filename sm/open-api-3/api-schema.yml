        <p>collection_method_type : 入金方法</p>
        </li>
        <li>
        <p>collecting_partner_id : 入金元の取引先ID</p>
        </li>
        <li>
        <p>charge_employee_id : 社内担当者の従業員ID</p>
        </li>
        <li>
        <p>reporting_section_id : 担当部門ID</p>
        </li>
        <li>
        <p>internal_memo : 社内メモ</p>
        </li>
        <li>
        <p>business_id : 案件ID</p>
        </li>
        <li>
        <p>lines : 明細リスト（指定した場合、既存の明細は全て削除され、新しい明細に置き換えられます）</p>
        </li>
        </ul>
        <p>※全ての項目は任意です。更新したい項目のみを送信してください。</p>
        <p>※recipient_addressを指定した場合、リクエストに含まれない項目はnullとして扱われます。</p>
        <h2 id="_3">注意点</h2>
        <h3>明細行の金額再計算について</h3>
        <p>納品を更新する際、登録後に下記の設定変更が行われていた場合は、明細行の金額が再計算されます。</p>
        <ul>
        <li><p>事業所(自社)の設定が変更された場合：freee会計の「設定」で変更可能な"消費税の経理処理"、"消費税の端数処理"の設定値</p></li>
        <li><p>取引先の設定が変更された場合：freeeの「取引先」で変更可能な"内税/外税"の設定値</p></li>
        </ul>
        <h3>納品書への反映について</h3>
        <p>発行済みの納品書がある場合、納品情報を更新しても納品書の内容には自動で反映されません。納品書の内容を更新するには、再発行が必要です。</p>
      operationId: update_delivery
      parameters:
        - name: id
          in: path
          required: true
          description: 納品ID
          schema:
            type: string
            example: 01JPP4FD1CVQWCDSWA90VE1ZTM
            maxLength: 26
            minLength: 26
      requestBody:
        $ref: '#/components/requestBodies/DeliveryUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/DeliveryUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '409':
          $ref: '#/components/responses/ConflictErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
  /sales:
    get:
      tags:
        - sales
      summary: 売上一覧
      description: |-
        <h2 id="">概要</h2>
        <p>売上の一覧を取得します。
        登録されている売上情報を一覧形式で取得できます。
        各種フィルタ条件を指定することで、特定の条件に合致する売上のみを取得することが可能です。
        </p>
        <h2 id="_2">定義</h2>
        <ul>
        <li>
        <p>start_registered_date : 売上登録日(絞り込み開始)</p>
        </li>
        <li>
        <p>end_registered_date : 売上登録日(絞り込み終了)</p>
        </li>
        <li>
        <p>start_revenue_recognition_date : 売上日(絞り込み開始)</p>
        </li>
        <li>
        <p>end_revenue_recognition_date : 売上日(絞り込み終了)</p>
        </li>
        <li>
        <p>charge_employee_ids : 社内担当者の従業員ID(複数指定可)</p>
        </li>
        <li>
        <p>customer_ids : 顧客の取引先ID(複数指定可)</p>
        </li>
        <li>
        <p>billing_status : 請求書送付ステータス</p>
        </li>
        <li>
        <p>collection_status : 入金ステータス</p>
        </li>
        <li>
        <p>canceled : 取消状態(デフォルト:false)</p>
        </li>
        </ul>
        <p>
        `limit`と`offset`パラメータを使用してページネーションが可能です。
        デフォルトでは20件ずつ取得され、最大100件まで一度に取得できます。
        </p>
      operationId: get_sales
      parameters:
        - $ref: '#/components/parameters/company_id'
        - $ref: '#/components/parameters/parameters-start_registered_date'
        - $ref: '#/components/parameters/parameters-end_registered_date'
        - $ref: '#/components/parameters/start_revenue_recognition_date'
        - $ref: '#/components/parameters/end_revenue_recognition_date'
        - $ref: '#/components/parameters/charge_employee_ids'
        - $ref: '#/components/parameters/customer_ids'
        - $ref: '#/components/parameters/billing_status'
        - $ref: '#/components/parameters/collection_status'
        - $ref: '#/components/parameters/canceled'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          $ref: '#/components/responses/SalesIndexResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    post:
      tags:
        - sales
      summary: 売上登録
      description: |-
        <h2 id="">概要</h2>
        <p>新しい売上を登録します。
        受注や納品に紐づく売上、または独立した売上を登録できます。
        </p>
        <h2 id="_2">定義</h2>
        <h3>必須項目</h3>
        <ul>
        <li>
        <p>revenue_recognition_date : 売上日</p>
        </li>
        <li>
        <p>customer_id : 顧客の取引先ID</p>
        </li>
        <li>
        <p>billing_partner_id : 請求先の取引先ID</p>
        </li>
        <li>
        <p>collecting_partner_id : 入金元の取引先ID</p>
        </li>
        <li>
        <p>collection_method_type : 入金方法</p>
        </li>
        <li>
        <p>billing_creating_method_type : 請求の管理</p>
        </li>
        <li>
        <p>lines : 明細リスト</p>
        </li>
        </ul>
        <h3>任意項目</h3>
        <ul>
        <li>
        <p>sales_order_id : 受注ID（受注に紐づける場合）</p>
        </li>
        <li>
        <p>delivery_id : 納品ID（納品に紐づける場合）</p>
        </li>
        <li>
        <p>business_id : 案件ID</p>
        </li>
        <li>
        <p>subject : 売上タイトル</p>
        </li>
        <li>
        <p>customer_order_no : 顧客注文No.</p>
        </li>
        <li>
        <p>bills_on : 請求日 ※billing_creating_method_typeがautomaticallyの場合は必須</p>
        </li>
        <li>
        <p>invoice_template_id : 請求書テンプレートID ※指定しない場合はデフォルトのテンプレートが適用されます。</p>
        </li>
        <li>
        <p>invoice_subject : 請求書件名</p>
        </li>
        <li>
        <p>invoice_note : 請求書の備考欄に掲載する内容</p>
        </li>
        <li>
        <p>collects_on : 入金期日 ※billing_creating_method_typeがautomaticallyの場合は必須</p>
        </li>
        <li>
        <p>charge_employee_id : 社内担当者の従業員ID</p>
        </li>
        <li>
        <p>reporting_section_id : 担当部門ID</p>
        </li>
        <li>
        <p>internal_memo : 社内メモ</p>
        </li>
        </ul>
      operationId: create_sale
      requestBody:
        $ref: '#/components/requestBodies/SaleCreateRequest'
      responses:
        '201':
          $ref: '#/components/responses/SaleCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '409':
          $ref: '#/components/responses/ConflictErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
  /sales/{id}:
    get:
      tags:
        - sales
      summary: 売上詳細取得
      description: |-
        <h2 id="">概要</h2>
        <p>指定されたIDの売上の詳細情報を取得します。
        売上の基本情報に加えて、請求・入金情報などの詳細な進捗情報も取得できます。
        </p>
      operationId: get_sale
      parameters:
        - $ref: '#/components/parameters/company_id'
        - name: id
          in: path
          required: true
          description: 売上ID
          schema:
            type: string
            example: 01JPP4FD1CVQWCDSWA90VE1ZTM
            maxLength: 26
            minLength: 26
      responses:
        '200':
          description: 売上詳細取得のレスポンス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleDetail'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
    patch:
      tags:
        - sales
      summary: 売上更新
      description: |-
        <h2 id="">概要</h2>
        <p>指定されたIDの売上を更新します。
        売上の基本情報、請求・入金情報などを部分的に更新できます。
        送信したフィールドのみが更新され、送信しなかったフィールドは変更されません。
        </p>
        <h2 id="_2">定義</h2>
        <h3>更新可能項目</h3>
        <ul>
        <li>
        <p>subject : 売上タイトル</p>
        </li>
        <li>
        <p>revenue_recognition_date : 売上日</p>
        </li>
        <li>
        <p>customer_order_no : 顧客注文No.</p>
        </li>
        <li>
        <p>customer_id : 顧客の取引先ID</p>
        </li>
        <li>
        <p>billing_partner_id : 請求先の取引先ID</p>
        </li>
        <li>
        <p>bills_on : 請求日</p>
        </li>
        <li>
        <p>invoice_template_id : 請求書テンプレートID</p>
        </li>
        <li>
        <p>invoice_subject : 請求書件名</p>
        </li>
        <li>
        <p>invoice_note : 請求書の備考欄に掲載する内容</p>
        </li>
        <li>
        <p>collecting_partner_id : 入金元の取引先ID</p>
        </li>
        <li>
        <p>collection_method_type : 入金方法</p>
        </li>
        <li>
        <p>collects_on : 入金期日</p>
        </li>
        <li>
        <p>charge_employee_id : 社内担当者の従業員ID</p>
        </li>
        <li>
        <p>reporting_section_id : 担当部門ID</p>
        </li>
        <li>
        <p>internal_memo : 社内メモ</p>
        </li>
        <li>
        <p>business_id : 案件ID</p>
        </li>
        <li>
        <p>lines : 明細リスト（指定した場合、既存の明細は全て削除され、新しい明細に置き換えられます）</p>
        </li>
        </ul>
        <p>※全ての項目は任意です。更新したい項目のみを送信してください。</p>
        <h2 id="_3">注意点</h2>
        <h3>明細行の金額再計算について</h3>
        <p>売上を更新する際、登録後に下記の設定変更が行われていた場合は、明細行の金額が再計算されます。</p>
        <ul>
        <li><p>事業所(自社)の設定が変更された場合：freee会計の「設定」で変更可能な"消費税の経理処理"、"消費税の端数処理"の設定値</p></li>
        <li><p>取引先の設定が変更された場合：freeeの「取引先」で変更可能な"内税/外税"の設定値</p></li>
        <li><p>明細取引タイプが変更された場合：freee販売の「明細取引タイプ」で変更可能な"税区分"、"軽減税率"の設定値</p></li>
        </ul>
        <h3>請求書への反映について</h3>
        <p>発行済みの請求書がある場合、売上情報を更新すると請求データは更新されますが、請求書の内容には自動で反映されません。請求書の内容を更新するには、再発行が必要です。</p>
      operationId: update_sale
      parameters:
        - name: id
          in: path
          required: true
          description: 売上ID
          schema:
            type: string
            example: 01JPP4FD1CVQWCDSWA90VE1ZTM
            maxLength: 26
            minLength: 26
      requestBody:
        $ref: '#/components/requestBodies/SaleUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/SaleUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '409':
          $ref: '#/components/responses/ConflictErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.secure.freee.co.jp/public_api/authorize
          tokenUrl: https://accounts.secure.freee.co.jp/public_api/token
          scopes:
            write: データの書き込み
            read: データの読み取り
  parameters:
    company_id:
      name: company_id
      in: query
      required: true
      description: 事業所ID
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 9223372036854776000
        example: 1
    start_business_date:
      name: start_business_date
      description: 案件登録日で絞込：開始日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
    end_business_date:
      name: end_business_date
      description: 案件登録日で絞込：終了日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
    sales_progression_ids:
      name: sales_progression_ids[]
      description: 受注確度ID
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          maxLength: 26
          minLength: 26
          example: 01K35WX4YTCRD5KG58GGWEV8JT
    business_phase_ids:
      name: business_phase_ids[]
      description: 案件フェーズID
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          maxLength: 26
          minLength: 26
          example: 01K35WX4YTCRD5KG58GGWEV8JT
    charge_employee_ids:
      name: charge_employee_ids[]
      description: 社内担当者の従業員ID
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          format: int64
          minimum: 1
          maximum: 9223372036854776000
          example: 1001
    customer_ids:
      name: customer_ids[]
      description: 顧客の取引先ID
      in: query
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          format: int64
          minimum: 1
          maximum: 9223372036854776000
          example: 12345
    canceled:
      name: canceled
      description: 取消状態
      in: query
      required: false
      schema:
        type: boolean
        default: false
    limit:
      name: limit
      description: 取得レコードの件数（デフォルト：20, 最小：1, 最大：100）
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
    offset:
      name: offset
      description: 取得レコードのオフセット（デフォルト：0）
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 2147483647
        default: 0
    start_sales_order_date:
      name: start_sales_order_date
      description: 受注日で絞込：開始日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2024-01-01'
    end_sales_order_date:
      name: end_sales_order_date
      description: 受注日で絞込：終了日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2024-12-31'
    start_registered_date:
      name: start_registered_date
      description: 登録日で絞込：開始日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2025-01-01'
    end_registered_date:
      name: end_registered_date
      description: 登録日で絞込：終了日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2025-05-01'
    start_delivery_date:
      name: start_delivery_date
      description: 納品日で絞込：開始日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2025-01-01'
    end_delivery_date:
      name: end_delivery_date
      description: 納品日で絞込：終了日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2025-05-01'
    start_acceptance_date:
      name: start_acceptance_date
      description: 検収日で絞込：開始日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2025-01-01'
    end_acceptance_date:
      name: end_acceptance_date
      description: 検収日で絞込：終了日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2025-05-01'
    delivery_status:
      name: delivery_status
      description: '納品ステータス (未納品: not_delivered, 納品済: delivered)'
      in: query
      required: false
      schema:
        type: string
        enum:
          - not_delivered
          - delivered
        example: not_delivered
    parameters-start_registered_date:
      name: start_registered_date
      description: 売上登録日で絞込：開始日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2024-01-01'
    parameters-end_registered_date:
      name: end_registered_date
      description: 売上登録日で絞込：終了日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2024-12-31'
    start_revenue_recognition_date:
      name: start_revenue_recognition_date
      description: 売上日で絞込：開始日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2024-01-01'
    end_revenue_recognition_date:
      name: end_revenue_recognition_date
      description: 売上日で絞込：終了日(yyyy-mm-dd)
      in: query
      required: false
      schema:
        type: string
        format: date
        example: '2024-12-31'
    billing_status:
      name: billing_status
      description: '請求書送付ステータス (未送付: not_billed, 送付済: billed, 対象外: none)'
      in: query
      required: false
      schema:
        type: string
        enum:
          - not_billed
          - billed
          - none
        example: not_billed
    collection_status:
      name: collection_status
      description: '決済ステータス (未決済: not_settled, 一部決済済: partially_settled, 決済済: settled, 対象外: none)'
      in: query
      required: false
      schema:
        type: string
        enum:
          - not_settled
          - partially_settled
          - settled
          - none
        example: not_settled
  schemas:
    Employee:
      description: 社内担当者
      type: object
      properties:
        id:
          type: integer
          format: int64
          maximum: 9223372036854776000
          description: 従業員ID
          example: 101
        display_name:
          type: string
          description: 従業員名
          example: 田中太郎
      required:
        - id
        - display_name
      nullable: true
      additionalProperties: false
    Customer:
      description: 顧客
      type: object
      properties:
        id:
          type: integer
          format: int64
          maximum: 9223372036854776000
          description: 取引先ID
          example: 1001
        name:
          type: string
          description: 取引先名
          example: 株式会社サンプル
        code:
          type: string
          description: 取引先コード
          nullable: true
