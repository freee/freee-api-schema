          type: string
          description: 部門名
          example: 開発部
      required:
        - id
        - name
      nullable: true
      additionalProperties: false
    BusinessDigest:
      type: object
      properties:
        id:
          type: string
          description: 案件ID
          example: 01JPP4FD1CVQWCDSWA90VE1ZTM
        name:
          type: string
          description: 案件名称
          example: サンプル案件
        business_date:
          type: string
          format: date
          description: 案件登録日
          nullable: true
          example: '2025-04-01'
        charge_employee:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Employee'
        code:
          type: string
          description: 案件コード
          example: B-0000000003
        canceled:
          type: boolean
          description: 取消状態
          example: false
        closed:
          type: boolean
          description: ロック状態
          example: false
        customer:
          description: 顧客
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Partner'
        sales_progression:
          $ref: '#/components/schemas/SalesProgression'
        scheduled_completion_date:
          type: string
          format: date
          description: 完了予定日
          nullable: true
          example: '2025-06-30'
        completion_date:
          type: string
          format: date
          description: 完了日
          nullable: true
          example: '2025-06-15'
        business_phase:
          $ref: '#/components/schemas/BusinessPhase'
        reporting_section:
          $ref: '#/components/schemas/ReportingSection'
        registered_at:
          type: string
          format: date-time
          description: 登録日時
          example: '2025-04-01T09:00:00+09:00'
        registered_by:
          description: 登録者
          allOf:
            - $ref: '#/components/schemas/Employee'
        last_updated_at:
          type: string
          format: date-time
          description: 変更日時
          example: '2025-04-15T14:30:00+09:00'
        last_updated_by:
          description: 変更者
          allOf:
            - $ref: '#/components/schemas/Employee'
      required:
        - id
        - name
        - code
        - canceled
        - closed
        - registered_at
        - registered_by
        - last_updated_at
        - last_updated_by
      additionalProperties: false
    PaginationMeta:
      type: object
      properties:
        limit_value:
          type: integer
          format: int32
          maximum: 2147483647
          description: 現在の1ページあたりの件数
          example: 50
        current_offset:
          type: integer
          format: int32
          maximum: 2147483647
          description: 現在のオフセット件数
          example: 0
        next_offset:
          type: integer
          format: int32
          maximum: 2147483647
          description: 次のオフセット（存在しない場合はnull）
          nullable: true
          example: 50
        prev_offset:
          type: integer
          format: int32
          maximum: 2147483647
          description: 前のオフセット（存在しない場合はnull）
          nullable: true
          example: 0
        total_count:
          type: integer
          format: int32
          maximum: 2147483647
          description: 現在のフィルタ条件での総件数
          example: 200
      required:
        - limit_value
        - current_offset
        - total_count
      additionalProperties: false
