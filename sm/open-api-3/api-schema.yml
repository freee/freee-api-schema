        <ul>
        <li>
        <p>start_amount_excluding_tax : 金額(税抜)の絞り込み下限</p>
        </li>
        <li>
        <p>end_amount_excluding_tax : 金額(税抜)の絞り込み上限</p>
        </li>
        <li>
        <p>business_ids : 案件ID(複数指定可)</p>
        </li>
        <li>
        <p>other_cost_no : その他原価No.</p>
        </li>
        <li>
        <p>start_last_updated_date : 更新日(絞り込み開始)</p>
        </li>
        <li>
        <p>end_last_updated_date : 更新日(絞り込み終了)</p>
        </li>
        <li>
        <p>start_incurred_date : 発生日の絞り込み開始日</p>
        </li>
        <li>
        <p>end_incurred_date : 発生日の絞り込み終了日</p>
        </li>
        <li>
        <p>canceled : 取消状態(デフォルト:false)</p>
        </li>
        </ul>
        <p>
        `limit`と`offset`パラメータを使用してページネーションが可能です。
        デフォルトでは20件ずつ取得され、最大100件まで一度に取得できます。
        </p>
      operationId: get_other_costs
      parameters:
        - $ref: '#/components/parameters/company_id'
        - name: start_amount_excluding_tax
          description: 金額(税抜)で絞込：下限
          in: query
          required: false
          schema:
            type: integer
            format: int64
            maximum: 999999999999
            minimum: -999999999999
        - name: end_amount_excluding_tax
          description: 金額(税抜)で絞込：上限
          in: query
          required: false
          schema:
            type: integer
            format: int64
            maximum: 999999999999
            minimum: -999999999999
        - name: business_ids[]
          description: 案件ID
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              minLength: 26
              maxLength: 26
              example: 01JPP4FD1CVQWCDSWA90VE1ZTM
        - $ref: '#/components/parameters/other_cost_no'
        - $ref: '#/components/parameters/canceled'
        - $ref: '#/components/parameters/parameters-start_last_updated_date'
        - $ref: '#/components/parameters/parameters-end_last_updated_date'
        - name: start_incurred_date
          description: 発生日で絞込：開始日(yyyy-mm-dd)
          in: query
          required: false
          schema:
            type: string
            format: date
            example: '2025-01-01'
        - name: end_incurred_date
          description: 発生日で絞込：終了日(yyyy-mm-dd)
          in: query
          required: false
          schema:
            type: string
            format: date
            example: '2025-12-31'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          $ref: '#/components/responses/OtherCostIndexResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
