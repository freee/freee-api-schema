      description: |-
        <h2 id="">概要</h2>
        <p>その他原価の一覧を取得します。
        登録されているその他原価情報を一覧形式で取得できます。
        各種フィルタ条件を指定することで、特定の条件に合致するその他原価のみを取得することが可能です。
